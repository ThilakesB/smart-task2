<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background offset shadow for the notebook (Yellow) -->
  <rect x="75" y="95" width="290" height="350" rx="30" ry="30" fill="#f4b400" />
  <!-- Background offset shadow for the notebook (White) -->
  <rect x="65" y="85" width="290" height="350" rx="30" ry="30" fill="#ffffff" />
  
  <!-- Main Notebook Card -->
  <rect x="55" y="75" width="290" height="350" rx="30" ry="30" fill="#d91a1a" stroke="#1e1e24" stroke-width="18" stroke-linejoin="round" />
  
  <!-- Left spine binding of the notebook (white strip) -->
  <path d="M 85 84 L 85 416" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
  
  <!-- Yellow highlights -->
  <line x1="140" y1="185" x2="260" y2="185" stroke="#f4b400" stroke-width="18" stroke-linecap="round" />
  <line x1="140" y1="255" x2="265" y2="255" stroke="#f4b400" stroke-width="18" stroke-linecap="round" />

  <!-- Text lines (overlapping highlights) -->
  <line x1="120" y1="165" x2="245" y2="165" stroke="#1e1e24" stroke-width="18" stroke-linecap="round" />
  <line x1="120" y1="235" x2="245" y2="235" stroke="#1e1e24" stroke-width="18" stroke-linecap="round" />
  
  <!-- Diagonal Pencil offset shadow (Yellow) -->
  <g transform="translate(262, 382) rotate(-55)">
    <polygon points="0,0 45,-22 45,22" fill="#f4b400" />
    <rect x="45" y="-22" width="185" height="44" fill="#f4b400" />
    <rect x="230" y="-22" width="30" height="44" fill="#f4b400" />
  </g>
  
  <!-- Diagonal Pencil offset shadow (White) -->
  <g transform="translate(252, 372) rotate(-55)">
    <polygon points="0,0 45,-22 45,22" fill="#ffffff" />
    <rect x="45" y="-22" width="185" height="44" fill="#ffffff" />
    <rect x="230" y="-22" width="30" height="44" fill="#ffffff" />
  </g>
  
  <!-- Diagonal Pencil (Main) -->
  <g transform="translate(242, 362) rotate(-55)">
    <!-- Body -->
    <rect x="45" y="-22" width="185" height="44" fill="#f4b400" stroke="#1e1e24" stroke-width="16" stroke-linejoin="round" />
    <!-- Tip Wood -->
    <polygon points="0,0 45,-22 45,22" fill="#ffebd6" stroke="#1e1e24" stroke-width="16" stroke-linejoin="round" />
    <!-- Tip Lead -->
    <polygon points="0,0 15,-7.3 15,7.3" fill="#1e1e24" />
    <!-- Eraser cap -->
    <rect x="230" y="-22" width="30" height="44" fill="#ffffff" stroke="#1e1e24" stroke-width="16" stroke-linejoin="round" />
    <path d="M 230 -22 L 230 22" stroke="#1e1e24" stroke-width="16" />
  </g>
</svg>